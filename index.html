<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventario PRO v5</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#eaf4ff;
}

header{
  background:#1e88e5;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{ padding:10px; }

.card{
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 0;
}

.item{
  flex:1;
  text-align:left;
}

.qty{
  width:60px;
  text-align:right;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin:3px;
}

.btn{ background:#1e88e5; color:white; }
.btn-green{ background:#43a047; color:white; }
.btn-danger{ background:#e53935; color:white; }

.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:30px;
  background:#1e88e5;
  color:white;
}

input{
  padding:10px;
  width:90%;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<header>
  <button onclick="back()">⬅️</button>
  <span>📦  PRO v5</span>
  <button onclick="shareApp()">📤</button>
</header>

<div class="container">

<div id="login">
  <input id="email" placeholder="Email creador"/>
  <button class="btn" onclick="login()">Entrar</button>
</div>

<div id="creator" style="display:none;">
  <button class="btn-green" onclick="crearLista()">+ Lista</button>
  <div id="listas"></div>
</div>

<div id="editor" style="display:none;"></div>
<div id="fill" style="display:none;"></div>

</div>

<button class="fab" onclick="addItemQuick()">+</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, push, remove, update } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzYkCG7aMTJxH2NH-_xJ7utAtOV4jjcfU",
  authDomain: "checklist-bb0f7.firebaseapp.com",
  databaseURL: "https://checklist-bb0f7-default-rtdb.firebaseio.com",
  projectId: "checklist-bb0f7",
  storageBucket: "checklist-bb0f7.firebasestorage.app",
  messagingSenderId: "606230877523",
  appId: "1:606230877523:web:4b147af89d07c76f21bda6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let user="";
let currentList=null;

/* LOGIN */
window.login=()=>{
  user=document.getElementById("email").value;

  if(user.includes("@")){
    document.getElementById("login").style.display="none";
    document.getElementById("creator").style.display="block";
    loadLists();
  }
}

/* BACK */
window.back=()=>{
  document.getElementById("editor").style.display="none";
  document.getElementById("fill").style.display="none";
  document.getElementById("creator").style.display="block";
}

/* SHARE */
window.shareApp=()=>{
  if(navigator.share){
    navigator.share({
      title:"Inventario PRO",
      url:location.href
    });
  }else{
    navigator.clipboard.writeText(location.href);
    alert("Link copiado 📋");
  }
}

/* CREAR LISTA */
window.crearLista=()=>{
  let name=prompt("Nombre lista");
  if(!name) return;

  let id=push(ref(db,"listas")).key;

  set(ref(db,"listas/"+id),{
    nombre:name,
    creador:user,
    items:{}
  });
}

/* LISTAS */
function loadLists(){
  onValue(ref(db,"listas"),snap=>{
    let div=document.getElementById("listas");
    div.innerHTML="";

    snap.forEach(l=>{
      let d=l.val();

      div.innerHTML+=`
        <div class="card">
          <b>${d.nombre}</b><br/>

          <button class="btn" onclick="openEditor('${l.key}')">Abrir</button>
          <button class="btn-green" onclick="shareList('${l.key}')">📤</button>
          <button class="btn-danger" onclick="del('${l.key}')">🗑</button>
        </div>
      `;
    });
  });
}

/* EDITOR */
window.openEditor=(id)=>{
  currentList=id;

  document.getElementById("creator").style.display="none";
  document.getElementById("editor").style.display="block";

  onValue(ref(db,"listas/"+id+"/items"),snap=>{
    let html="<h3>✏️ Editar</h3>";

    snap.forEach(i=>{
      html+=`
        <div class="card row">
          <input class="item"
            value="${i.val().name}"
            onchange="editName('${id}','${i.key}',this.value)"/>

          <input class="qty"
            type="number"
            min="0"
            max="99"
            value="${i.val().qty}"
            onchange="editQty('${id}','${i.key}',this.value)"/>
        </div>
      `;
    });

    document.getElementById("editor").innerHTML=html;
  });
}

/* EDIT */
window.editName=(l,i,v)=>{
  update(ref(db,"listas/"+l+"/items/"+i),{name:v});
}

window.editQty=(l,i,v)=>{
  if(v>99) v=99;
  if(v<0) v=0;

  update(ref(db,"listas/"+l+"/items/"+i),{qty:v});
}

/* QUICK + */
window.addItemQuick=()=>{
  if(!currentList) return alert("Abre una lista");

  let name=prompt("Artículo");
  let qty=prompt("Cantidad (00-99)");

  if(qty>99) qty=99;

  let id=push(ref(db,"listas/"+currentList+"/items")).key;

  set(ref(db,"listas/"+currentList+"/items/"+id),{
    name, qty
  });
}

/* SHARE */
window.shareList=(id)=>{
  let link=location.origin+"?modo=fill&id="+id;

  if(navigator.share){
    navigator.share({
      title:"Lista",
      url:link
    });
  }else{
    navigator.clipboard.writeText(link);
    alert("Link copiado 📋");
  }
}

/* DELETE */
window.del=(id)=>{
  remove(ref(db,"listas/"+id));
}

</script>

</body>
</html>
